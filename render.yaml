services:
  - type: web
    name: emotion-inference
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: EMOTION_API_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://TU_MOODLE
      # Opción B: descarga del modelo en arranque
      # - key: MODEL_URL
      #   value: https://TU-SERVER/face_models/emociones_resnet50.onnx
